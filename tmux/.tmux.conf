# ==========================
# CORE SETTINGS
# ==========================
# Fix colors for LazyVim (Tells Tmux to allow true RGB color)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",tmux-256color:RGB"

# Make the status bar background transparent to match Ghostty
# Use default text color for the foreground
set -g status-style bg=default,fg=default

# Inactive windows: slightly muted text (TokyoNight Day muted)
setw -g window-status-style bg=default,fg=colour8

# Active window: TokyoNight blue (colour4) and bold so it stands out
setw -g window-status-current-style bg=default,fg=colour4,bold

# Pane borders: Muted for inactive, TokyoNight blue for the active pane
set -g pane-border-style fg=colour8
set -g pane-active-border-style fg=colour4

# Command line/message text (TokyoNight Day bg, fg)
set -g message-style bg=#e1e2e7,fg=#3760bf,bold

# Mouse selection color (TokyoNight Day visual selection)
set -g mode-style "bg=#b6bfe2"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g mouse on
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Double tap Ctrl+b to send the keystroke to Neovim (for floating docs)
bind C-b send-prefix

# ==========================
# CUSTOM KEYBINDINGS
# ==========================
bind % split-window -h -c "#{pane_current_path}"

# Split vertically (top/bottom) in the same directory
bind '"' split-window -v -c "#{pane_current_path}"

# Keyboard-only Vim-style pane resizing (Prefix + Shift + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Easy reload (Prefix + r)
bind r source-file ~/.tmux.conf \; display "Tmux Config Reloaded!"

# add new window with the same path
bind c new-window -c "#{pane_current_path}"

# ==========================
# LAZYVIM NAVIGATION BRIDGE
# ==========================
# Smart pane switching with awareness of Vim splits.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'



# Create 3-pane IDE layout in the current directory: nvim (top-left), terminal (bottom-left), claude (right)
bind-key I split-window -h -p 35 -c "#{pane_current_path}" \; select-pane -L \; split-window -v -p 30 -c "#{pane_current_path}" \; select-pane -U \; send-keys "nvim ." C-m \; select-pane -R \; send-keys "claude ." C-m \; select-pane -L \; select-pane -D
