# ==========================
# CORE SETTINGS
# ==========================
# Fix colors for LazyVim (Tells Tmux to allow true RGB color)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Make the status bar background transparent to match Ghostty
# Use default text color for the foreground
set -g status-style bg=default,fg=default

# Inactive windows: slightly muted text (usually maps to a grey in GitHub Light)
setw -g window-status-style bg=default,fg=colour8

# Active window: GitHub blue (colour4) and bold so it stands out
setw -g window-status-current-style bg=default,fg=colour4,bold

# Pane borders: Light grey for inactive, GitHub blue for the active pane
set -g pane-border-style fg=colour7
set -g pane-active-border-style fg=colour4

# Command line/message text
set -g message-style bg=colour7,fg=colour0,bold

# Fix the muddy brown mouse selection color
set -g mode-style "bg=#b2d7ff"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g mouse on
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Double tap Ctrl+b to send the keystroke to Neovim (for floating docs)
bind C-b send-prefix

# ==========================
# CUSTOM KEYBINDINGS
# ==========================
bind % split-window -h -c "#{pane_current_path}"

# Split vertically (top/bottom) in the same directory
bind '"' split-window -v -c "#{pane_current_path}"

# Keyboard-only Vim-style pane resizing (Prefix + Shift + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Easy reload (Prefix + r)
bind r source-file ~/.tmux.conf \; display "Tmux Config Reloaded!"

# add new window with the same path
bind c new-window -c "#{pane_current_path}"

# ==========================
# LAZYVIM NAVIGATION BRIDGE
# ==========================
# Smart pane switching with awareness of Vim splits.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
